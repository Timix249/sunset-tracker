const analytics = getAnalytics(app);
const db = getFirestore(app);

async function trackVisit(){

let device = navigator.userAgent
let time = new Date().toLocaleString()

await addDoc(collection(db,"visits"),{

device:device,
time:time

})

}

trackVisit()
